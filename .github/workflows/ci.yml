name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Only cancel in-progress runs for PRs, not main branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '20'

jobs:
  # Build the agentbox Go binary from the vendor/agentbox submodule.
  # Cached by submodule commit SHA — only rebuilds when the submodule pointer moves.
  agentbox-build:
    name: Build agentbox binary
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.submodule-sha.outputs.cache-key }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PARENT_REPO_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get submodule SHA for cache key
        id: submodule-sha
        run: |
          SHA=$(git ls-tree HEAD vendor/agentbox | awk '{print $3}')
          if [ -z "$SHA" ]; then
            echo "ERROR: vendor/agentbox not found in tree — submodule commit missing" >&2
            exit 1
          fi
          echo "cache-key=agentbox-bin-${SHA}" >> $GITHUB_OUTPUT

      - name: Restore agentbox binary cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: dist/bin/agentbox
          key: ${{ steps.submodule-sha.outputs.cache-key }}

      - name: Setup Go
        if: steps.cache-restore.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: Build agentbox binary
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: npm run agentbox:build

      - name: Save agentbox binary cache
        if: steps.cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: dist/bin/agentbox
          key: ${{ steps.submodule-sha.outputs.cache-key }}

  # Shared install job to avoid downloading dependencies 4x
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PARENT_REPO_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PARENT_REPO_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          fail-on-cache-miss: true

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PARENT_REPO_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          fail-on-cache-miss: true

      - name: Run TypeScript type check
        run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PARENT_REPO_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          fail-on-cache-miss: true

      - name: Build
        run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [install, agentbox-build]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PARENT_REPO_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          fail-on-cache-miss: true

      - name: Restore agentbox binary
        uses: actions/cache/restore@v4
        with:
          path: dist/bin/agentbox
          key: ${{ needs.agentbox-build.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PARENT_REPO_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          fail-on-cache-miss: true

      - name: Run npm audit
        run: npm audit --audit-level=high

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [install, build, agentbox-build]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PARENT_REPO_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          fail-on-cache-miss: true

      - name: Restore agentbox binary
        uses: actions/cache/restore@v4
        with:
          path: dist/bin/agentbox
          key: ${{ needs.agentbox-build.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Run smoke tests
        run: npm run test:smoke

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PARENT_REPO_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          fail-on-cache-miss: true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Mutation testing on the security perimeter (#353).
  # `continue-on-error: true` until the score baseline stabilises —
  # NOT in ci-success's `needs:` list yet so a fluctuating score
  # doesn't block PRs. Promote to required after a few stable runs.
  mutation:
    name: Mutation Testing (security perimeter)
    runs-on: ubuntu-latest
    needs: install
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PARENT_REPO_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          fail-on-cache-miss: true

      - name: Run Stryker
        run: npm run test:mutation

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stryker-report
          path: reports/mutation/
          retention-days: 14

  # Summary job for branch protection - uses alls-green for robust checking.
  # `mutation` is intentionally absent from `needs:` while we calibrate;
  # see the comment on the mutation job above.
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [install, agentbox-build, lint, typecheck, build, test, smoke, e2e, security]
    if: always()
    steps:
      - name: Check all jobs passed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
